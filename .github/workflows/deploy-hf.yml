name: Deploy to Hugging Face Space

# Vercel-style auto-deploy: every push to main mirrors this repo to the HF Space.
# The committed README has no HF frontmatter (keeps GitHub clean) — we inject it
# here at deploy time. Uses the hf CLI (API auth), so no git-credential juggling.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject HF Space frontmatter into README
        run: |
          cat > README.hf <<'EOF'
          ---
          title: Takt
          emoji: 🎛️
          colorFrom: blue
          colorTo: gray
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          EOF
          cat README.md >> README.hf
          mv README.hf README.md

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install hf CLI
        run: pip install -q -U "huggingface_hub[cli]"

      # A fresh checkout contains only tracked files (no node_modules/.env/.next —
      # they're gitignored), so this uploads exactly the right set. delete "*"
      # makes it a true mirror: files removed from the repo are removed from the Space.
      # NOTE: `hf upload` always hits repos/create first, which HF now answers
      # with 402 on free accounts EVEN WHEN the Space already exists — so call
      # upload_folder directly (it never attempts creation).
      - name: Deploy to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).upload_folder(
              folder_path=".",
              repo_id="yashwanttth/takt",
              repo_type="space",
              delete_patterns=["*"],
              ignore_patterns=[".git/*", ".github/*"],
              commit_message=f"Deploy from GitHub @ {os.environ['GITHUB_SHA'][:7]}",
          )
          EOF
