packages:
  - "packages/*"
  - "apps/*"
  - "services/*"
  - "pipeline/*"

# Force ONE @huggingface/transformers copy across the tree. kokoro-js pulls 3.8.1
# while we use 4.2.0; two copies = two onnxruntime-node envs that clash ("Preferred
# output locations…") and segfault. Unifying on 4.2.0 keeps a single ORT world.
overrides:
  "@huggingface/transformers": "4.2.0"

# Native modules we trust and need compiled on install (so a fresh clone "just works").
allowBuilds:
  better-sqlite3: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true

minimumReleaseAgeExclude:
  - '@anthropic-ai/sdk@0.107.0'
  - '@tailwindcss/node@4.3.2'
  - '@tailwindcss/oxide-android-arm64@4.3.2'
  - '@tailwindcss/oxide-darwin-arm64@4.3.2'
  - '@tailwindcss/oxide-darwin-x64@4.3.2'
  - '@tailwindcss/oxide-freebsd-x64@4.3.2'
  - '@tailwindcss/oxide-linux-arm-gnueabihf@4.3.2'
  - '@tailwindcss/oxide-linux-arm64-gnu@4.3.2'
  - '@tailwindcss/oxide-linux-arm64-musl@4.3.2'
  - '@tailwindcss/oxide-linux-x64-gnu@4.3.2'
  - '@tailwindcss/oxide-linux-x64-musl@4.3.2'
  - '@tailwindcss/oxide-wasm32-wasi@4.3.2'
  - '@tailwindcss/oxide-win32-arm64-msvc@4.3.2'
  - '@tailwindcss/oxide-win32-x64-msvc@4.3.2'
  - '@tailwindcss/oxide@4.3.2'
  - '@tailwindcss/postcss@4.3.2'
  - mupdf@1.28.0
  - tailwindcss@4.3.2
